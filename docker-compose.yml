name: walink-docker
services:
    walink:
        build: .
        cpu_shares: 90
        container_name: walink-docker-001
        deploy:
            resources:
                limits:
                    memory: "1024m"
        environment:
            TZ: Pacific/Apia
            # Puppeteer configuration
            PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
            PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium-browser"
            # WhatsApp Client configuration
            DEVICE_NAME: "Personal PC"
            BROWSER_NAME: "Chrome"
            # PROXY_USERNAME: "proxy_user"
            # PROXY_PASSWORD: "proxy_pass"
            # MQTT configuration
            MQTT_ENABLE: "true"
            MQTT_BROKER_URL: ${MQTT_BROKER_URL}
            MQTT_USERNAME: ${MQTT_USERNAME}
            MQTT_PASSWORD: ${MQTT_PASSWORD}
            MQTT_CLIENT_ID: ${MQTT_CLIENT_ID}
            MQTT_INCOMING_TOPIC: ${MQTT_INCOMING_TOPIC}
            MQTT_OUTGOING_TOPIC: ${MQTT_OUTGOING_TOPIC}
        hostname: walink
        labels:
            casaos.category: Development
            casaos.description: "WhatsApp Link in Docker"
            casaos.hostname: ""
            casaos.icon: https://raw.githubusercontent.com/pedroslopez/whatsapp-web.js/main/docs/assets/wwebjs.png
            casaos.name: WhatsApp Link 001
            casaos.path: ""
            casaos.port_map: ""
            casaos.scheme: http
            icon: https://raw.githubusercontent.com/pedroslopez/whatsapp-web.js/main/docs/assets/wwebjs.png
        network_mode: bridge
        restart: unless-stopped
        volumes:
            - walink_auth:/usr/src/app/.wwebjs_auth
            - walink_cache:/usr/src/app/.wwebjs_cache
        # Add security options for running Chromium in container
        security_opt:
            - seccomp:unconfined
        # Add shared memory size for Chromium
        shm_size: 2gb
networks:
    default:
        name: walink-docker_default
volumes:
    walink_auth:
    walink_cache:
x-casaos:
    author: self
    category: self
    hostname: ""
    icon: https://raw.githubusercontent.com/pedroslopez/whatsapp-web.js/main/docs/assets/wwebjs.png
    index: /
    is_uncontrolled: false
    port_map: ""
    scheme: http
    title:
        custom: WhatsApp Link - 001
